name: CI

on:
  push:
  pull_request:

jobs:
  # M10a — pure-Dart unit/widget suite. No emulator, no real Firebase.
  flutter-tests:
    name: Flutter analyze + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: stable
          cache: true

      # firebase_options.dart is gitignored (per-project config). Tests never
      # touch real Firebase, but lib/ must still compile, so write a stub.
      - name: Generate CI firebase_options stub
        run: |
          cat > lib/firebase_options.dart <<'EOF'
          // GENERATED FOR CI ONLY — not the real project config. Tests do not
          // connect to Firebase; this only satisfies the import in
          // firebase_init.dart so `flutter analyze`/`test` can compile.
          import 'package:firebase_core/firebase_core.dart';

          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform => const FirebaseOptions(
                  apiKey: 'ci-stub',
                  appId: 'ci-stub',
                  messagingSenderId: 'ci-stub',
                  projectId: 'ci-stub',
                );
          }
          EOF

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  # M10b — Firestore Security Rules + Cloud Functions against the emulator.
  # CI can install JDK 21, so it uses the latest firebase-tools (unlike the
  # local Windows machine, which pins firebase-tools@13 for JDK 17).
  backend-tests:
    name: Rules + Functions (emulator)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firebase
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Firebase emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}

      - run: npm install -g firebase-tools

      - run: npm ci --prefix functions
      - run: npm ci --prefix rules-tests

      - name: Security Rules tests
        run: >
          firebase emulators:exec --only firestore --project demo-travacs
          "npm --prefix rules-tests test"

      - name: Cloud Functions tests
        run: >
          firebase emulators:exec --only firestore --project demo-travacs
          "npm --prefix functions test"
